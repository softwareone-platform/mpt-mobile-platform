# SonarCloud Configuration
# Documentation: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/ci-based-analysis/

# Project identification
sonar.projectKey=softwareone-pc_mpt-mobile-platform-v2
sonar.organization=softwareone-pc
sonar.host.url=https://sonarcloud.io

# Project metadata
sonar.projectName=MPT Mobile Platform
sonar.projectVersion=4.0.0

# Source code configuration (paths relative to app/ directory)
sonar.sources=src
sonar.tests=src/__tests__
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript configuration
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/test/**,\
  **/__tests__/**,\
  **/__mocks__/**,\
  **/assets/**,\
  **/*.config.js,\
  **/babel.config.js,\
  **/metro.config.js,\
  **/jest.config.js

# Test exclusions (already covered by sonar.tests)
sonar.test.exclusions=\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/__mocks__/**

# Coverage exclusions
sonar.coverage.exclusions=\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/__mocks__/**,\
  **/types/**,\
  **/constants/**,\
  **/*.d.ts,\
  **/*.tsx,\
  **/styles/**/*.ts,\
  **/hooks/queries/**/*.ts,\
  **/i18n/**

# Duplication exclusions
# The 5 *DetailsContent.tsx / *Screen.tsx entries below are acknowledged duplicates
# tracked in MPT-21329 — we deliberately chose not to introduce a new abstraction.
sonar.cpd.exclusions=\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/screens/sales-orders/SalesOrderDetailsContent.tsx,\
  **/screens/sales-quotes/SalesQuoteDetailsContent.tsx,\
  **/screens/licensees/LicenseeDetailsContent.tsx,\
  **/screens/clients/ClientsScreen.tsx,\
  **/screens/vendors/VendorsScreen.tsx
