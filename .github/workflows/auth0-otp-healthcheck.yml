name: Auth0 OTP Health Check
run-name: "Auth0 OTP Health Check (${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }})"

on:
  schedule:
    # Every 12 hours, on the hour
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read

# Avoid stacking up overlapping scheduled runs if a probe ever hangs near the timeout.
concurrency:
  group: auth0-otp-healthcheck
  cancel-in-progress: false

jobs:
  check:
    name: Check ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        environment: [test, qa, prod, dev]
    environment:
      name: ${{ matrix.environment }}
    steps:
      - name: Validate Auth0 configuration
        env:
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
        run: |
          if [ -z "${AUTH0_DOMAIN}" ]; then
            echo "::error title=Auth0 misconfigured (${{ matrix.environment }})::AUTH0_DOMAIN is not set for environment '${{ matrix.environment }}'"
            exit 1
          fi
          if [ -z "${AUTH0_CLIENT_ID}" ]; then
            echo "::error title=Auth0 misconfigured (${{ matrix.environment }})::AUTH0_CLIENT_ID secret is not set for environment '${{ matrix.environment }}'"
            exit 1
          fi
          echo "Auth0 config present for ${{ matrix.environment }} (domain: ${AUTH0_DOMAIN})"

      - name: Probe OIDC discovery endpoint
        id: oidc
        env:
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
        run: |
          URL="https://${AUTH0_DOMAIN}/.well-known/openid-configuration"
          echo "GET ${URL}"

          HTTP_CODE=$(curl -sS -o /tmp/oidc-body.json -w "%{http_code}" \
            --max-time 15 --retry 2 --retry-delay 2 \
            "${URL}" || echo "000")

          echo "Response status: ${HTTP_CODE}"
          echo "status=${HTTP_CODE}" >> "$GITHUB_OUTPUT"

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error title=OIDC discovery failed (${{ matrix.environment }})::Expected 200 from ${URL}, got ${HTTP_CODE}"
            echo "Response body:"
            cat /tmp/oidc-body.json || true
            echo
            exit 1
          fi

          # `jq -e` exits non-zero if `.issuer` is null/missing or the body is not valid JSON.
          # This is more precise than a substring grep, which could false-match on a quoted value.
          if ! jq -e '.issuer | type == "string" and length > 0' /tmp/oidc-body.json >/dev/null 2>&1; then
            echo "::error title=OIDC discovery invalid (${{ matrix.environment }})::Response from ${URL} is not valid JSON or has no non-empty issuer field"
            cat /tmp/oidc-body.json
            echo
            exit 1
          fi
          echo "OIDC discovery OK"

      - name: Probe passwordless start (email OTP)
        id: passwordless
        env:
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          # Optional per-env override; defaults to an IANA-reserved sink domain
          # (example.com) so no real mailbox is bothered. Override only if a
          # tenant rejects example.com via an allowlist or similar.
          AUTH0_HEALTHCHECK_EMAIL: ${{ vars.AUTH0_HEALTHCHECK_EMAIL || 'auth0-otp-healthcheck@example.com' }}
        run: |
          URL="https://${AUTH0_DOMAIN}/passwordless/start"
          echo "POST ${URL}"

          # We send a syntactically valid email at a non-deliverable reserved
          # domain. Auth0 returns 200 from this endpoint only when the email
          # passwordless connection is enabled AND the client is authorised for
          # it; otherwise it returns 4xx (bad.connection, unauthorized_client,
          # extensibility_error, etc.). Per Auth0's "prevent user enumeration"
          # guidance, a 200 is returned regardless of whether the email belongs
          # to a real user — so we don't need (and shouldn't use) a real mailbox.
          # This catches the dev team's most common failure mode: passwordless
          # accidentally disabled in the Auth0 dashboard while the tenant itself
          # is still up. Build the JSON payload via `jq -nc` so client_id is
          # escaped correctly and we don't depend on YAML/heredoc indentation.
          PAYLOAD=$(jq -nc \
            --arg client_id "${AUTH0_CLIENT_ID}" \
            --arg email "${AUTH0_HEALTHCHECK_EMAIL}" \
            '{client_id: $client_id, connection: "email", email: $email, send: "code"}')

          HTTP_CODE=$(curl -sS -o /tmp/pwl-body.json -w "%{http_code}" \
            --max-time 15 --retry 2 --retry-delay 2 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${URL}" || echo "000")

          echo "Response status: ${HTTP_CODE}"
          echo "Response body:"
          cat /tmp/pwl-body.json || true
          echo
          echo "status=${HTTP_CODE}" >> "$GITHUB_OUTPUT"

          # Healthy = HTTP 200. Anything else means passwordless is not working.
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "Passwordless start succeeded — email connection is enabled at ${AUTH0_DOMAIN}"
            exit 0
          fi

          # Non-200: classify the failure for an actionable error message.
          # 1. Non-numeric status (covers "000" from `|| echo` on curl failure,
          #    and any other unexpected non-digit output — avoids a bash
          #    arithmetic error on `-ge`).
          case "${HTTP_CODE}" in
            000)
              echo "::error title=Auth0 OTP endpoint unreachable (${{ matrix.environment }})::curl could not reach ${URL}"
              exit 1
              ;;
            ''|*[!0-9]*)
              echo "::error title=Auth0 OTP endpoint anomaly (${{ matrix.environment }})::Unexpected non-numeric status '${HTTP_CODE}' from ${URL}"
              exit 1
              ;;
          esac

          if [ "${HTTP_CODE}" -ge 500 ]; then
            echo "::error title=Auth0 OTP endpoint unhealthy (${{ matrix.environment }})::${URL} returned ${HTTP_CODE} (expected 200) — Auth0 server-side error"
            exit 1
          fi

          # 4xx — parse the body for a more specific message.
          ERROR_CODE=$(jq -r '.error // empty' /tmp/pwl-body.json 2>/dev/null || true)
          ERROR_DESCRIPTION=$(jq -r '.error_description // .description // .message // empty' /tmp/pwl-body.json 2>/dev/null || true)

          case "${ERROR_CODE}" in
            unauthorized_client|access_denied|extensibility_error|bad.connection)
              echo "::error title=Auth0 passwordless disabled (${{ matrix.environment }})::Auth0 returned '${ERROR_CODE}' — email/passwordless connection appears disabled or client unauthorised at ${AUTH0_DOMAIN}: ${ERROR_DESCRIPTION}"
              exit 1
              ;;
          esac

          if printf '%s' "${ERROR_DESCRIPTION}" | grep -qiE 'connection.*(disabled|not enabled|not found)|passwordless.*disabled'; then
            echo "::error title=Auth0 passwordless disabled (${{ matrix.environment }})::Email/passwordless connection appears disabled at ${AUTH0_DOMAIN}: ${ERROR_DESCRIPTION}"
            exit 1
          fi

          echo "::error title=Auth0 passwordless not working (${{ matrix.environment }})::${URL} returned ${HTTP_CODE} (expected 200). Error: '${ERROR_CODE}' / description: '${ERROR_DESCRIPTION}'"
          exit 1

      - name: Write job summary
        if: always()
        env:
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
        run: |
          ENV_NAME="${{ matrix.environment }}"
          OIDC_STATUS="${{ steps.oidc.outputs.status || 'n/a' }}"
          PWL_STATUS="${{ steps.passwordless.outputs.status || 'n/a' }}"

          if [ "${{ job.status }}" = "success" ]; then
            ICON="✅"
            RESULT="Healthy"
          else
            ICON="❌"
            RESULT="**FAILED**"
          fi

          {
            echo "### ${ICON} Auth0 OTP — ${ENV_NAME}: ${RESULT}"
            echo ""
            echo "| Check | Endpoint | Expected | Got |"
            echo "| --- | --- | --- | --- |"
            echo "| Auth0 client up | \`https://${AUTH0_DOMAIN}/.well-known/openid-configuration\` | 200 | ${OIDC_STATUS} |"
            echo "| Passwordless works | \`https://${AUTH0_DOMAIN}/passwordless/start\` | 200 | ${PWL_STATUS} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Overall result
    needs: check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Mark run as failed if any environment failed
        run: |
          RESULT="${{ needs.check.result }}"
          echo "Matrix result: ${RESULT}"
          {
            echo "## Auth0 OTP Health Check"
            echo ""
            if [ "${RESULT}" = "success" ]; then
              echo "✅ All environments (test, qa, prod, dev) healthy."
            else
              echo "❌ **One or more environments failed.** Check the individual matrix jobs above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${RESULT}" != "success" ]; then
            echo "::error title=Auth0 OTP Health Check failed::At least one environment (test/qa/prod/dev) failed its Auth0 OTP checks. See matrix jobs for details."
            exit 1
          fi

  # Post to a Microsoft Teams channel when a run goes red, whether it was
  # triggered by the cron schedule or manually via workflow_dispatch. See
  # MPT-20569.
  #
  # Set up: in the target Teams channel, add a workflow from the
  # "Send webhook alerts to a channel" template (channel → ⋯ →
  # Workflows → Add). Microsoft's legacy "Office 365 Connector" Incoming
  # Webhooks are being retired; this template is its replacement and
  # requires an Adaptive Card payload (a plain `{"text": "..."}` body is
  # accepted by the trigger but fails downstream). Store the generated
  # URL as the `TEAMS_WEBHOOK_URL` repository secret.
  notify-on-failure:
    name: Notify on failure
    needs: summary
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # Needed for `gh api .../jobs` to read the matrix job conclusions
      # we surface in the per-environment breakdown.
      actions: read
    steps:
      - name: Notify Teams channel
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${TEAMS_WEBHOOK_URL}" ]; then
            echo "::warning title=Teams webhook not configured::TEAMS_WEBHOOK_URL secret is not set; skipping Teams notification"
            exit 0
          fi

          # Pull each matrix check job's conclusion from the run's job
          # listing so we can render a per-environment breakdown. Matrix
          # jobs are named "Check <env>" — keep in lockstep with the
          # `check` job's `name:` field above if it's ever renamed.
          JOBS_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100")
          # Sort by the matrix declaration order from the `check` job so
          # the card always reads test → qa → prod → dev regardless of
          # which matrix instance completed first. Anything unrecognised
          # falls to the end.
          ENV_STATUSES=$(echo "${JOBS_JSON}" | jq '[
            .jobs[]
            | select(.name | test("^Check "))
            | {env: (.name | sub("^Check "; "")), conclusion: .conclusion}
          ] | sort_by(.env as $e | ["test","qa","prod","dev"] | index($e) // 999)')
          FAILED_COUNT=$(echo "${ENV_STATUSES}" | jq 'map(select(.conclusion != "success")) | length')
          TOTAL_COUNT=$(echo "${ENV_STATUSES}" | jq 'length')
          echo "Per-env results: ${ENV_STATUSES}"
          echo "Failed: ${FAILED_COUNT} of ${TOTAL_COUNT}"

          # Build the payload via jq so the run URL is JSON-escaped
          # correctly and we don't depend on YAML/heredoc indentation. The
          # "Send webhook alerts to a channel" template REQUIRES an
          # Adaptive Card or Message Card payload — a plain `{"text": "..."}`
          # body is accepted at the webhook layer (HTTP 202) but causes
          # the downstream flow run to fail without posting anything to
          # Teams.
          PAYLOAD=$(jq -nc \
            --arg run_url "${RUN_URL}" \
            --arg failed_count "${FAILED_COUNT}" \
            --arg total_count "${TOTAL_COUNT}" \
            --argjson env_statuses "${ENV_STATUSES}" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    {
                      type: "TextBlock",
                      size: "Medium",
                      weight: "Bolder",
                      color: "Attention",
                      text: "❌ Auth0 OTP Health Check — \($failed_count) of \($total_count) environments unhealthy"
                    },
                    {
                      type: "FactSet",
                      facts: [
                        $env_statuses[]
                        | {
                            title: .env,
                            value: (
                              if .conclusion == "success" then "✅ Healthy"
                              elif .conclusion == "failure" then "❌ Failed"
                              elif .conclusion == "cancelled" then "⚠️ Cancelled"
                              elif .conclusion == "skipped" then "➖ Skipped"
                              else "❓ \(.conclusion // "unknown")"
                              end
                            )
                          }
                      ]
                    }
                  ],
                  actions: [
                    {
                      type: "Action.OpenUrl",
                      title: "View workflow run",
                      url: $run_url
                    }
                  ]
                }
              }]
            }')

          HTTP_CODE=$(curl -sS -o /tmp/teams-body.txt -w "%{http_code}" \
            --max-time 15 --retry 2 --retry-delay 2 \
            -X POST -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${TEAMS_WEBHOOK_URL}" || echo "000")

          echo "Teams webhook response: ${HTTP_CODE}"
          echo "Response body:"
          cat /tmp/teams-body.txt || true
          echo

          # Power Automate flows typically return 202 Accepted; legacy
          # connectors returned 200. Anything else is a delivery failure.
          case "${HTTP_CODE}" in
            200|201|202)
              echo "Teams notification posted."
              ;;
            *)
              echo "::error title=Teams notification failed::Teams webhook returned ${HTTP_CODE}"
              exit 1
              ;;
          esac
